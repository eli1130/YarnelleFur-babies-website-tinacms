name: Generate tina-lock.json
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx tinacms build --skip-cloud-checks
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          TINA_BRANCH: main
      - run: cat tina/tina-lock.json 2>/dev/null || echo "FILE NOT FOUND"
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update tina-lock.json"
          file_pattern: tina/tina-lock.json
