name: Generate tina-lock.json
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx tinacms build --local --skip-cloud-checks
      - run: find . -name "tina-lock.json" 2>/dev/null || echo "tina-lock.json not found"
      - run: ls -la tina/ || echo "tina folder contents above"
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update tina-lock.json"
          file_pattern: tina/tina-lock.json
          
